<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMS Prototype</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
      text-align: center;
    }
    header {
      background: #1e293b;
      color: white;
      padding: 20px;
      font-size: 24px;
    }
    .hero {
      padding: 60px 20px;
    }
    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }
    .hero p {
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      padding: 12px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  Building Management System
</header>

<div class="hero">
  <h1>Manage Buildings. Simplify Operations.</h1>
  <p>All-in-one platform for tenants, maintenance, billing, and more.</p>

  <a href="login.html" class="btn">Enter System</a>
</div>

<div class="features">
  <div class="card">Property Management</div>
  <div class="card">Tenant Management</div>
  <div class="card">Maintenance</div>
  <div class="card">Billing & Payments</div>
</div>

</body>
</html>
